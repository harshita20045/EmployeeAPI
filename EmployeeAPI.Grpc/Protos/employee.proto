syntax = "proto3";

option csharp_namespace = "EmployeeAPI.Grpc";


service EmployeeAPI {
  rpc GetEmployee (Empty) returns (GetAllEmployeeResponse);
  rpc GetEmployeeById (GetEmployeeByIdRequest) returns (GetEmployeeResponse);
  rpc CreateEmployee (CreateEmployeeRequest) returns (GetEmployeeResponse);
  rpc UpdateEmployee (UpdateEmployeeRequest) returns (GetEmployeeResponse);
  rpc DeleteEmployee (DeleteEmployeeRequest) returns (DeleteEmployeeResponse);
}

message Empty{}

message GetEmployeeResponse{
	int32 id=1;
	string firstName=2;
	string lastName=3;
	string email=4;
}

message GetEmployeeByIdRequest{
int32 id =1;
}

message GetAllEmployeeResponse{
  repeated GetEmployeeResponse employees=1;
}

message CreateEmployeeRequest{
	string firstName=1;
	string lastName=2;
	string email=3;
}
message UpdateEmployeeRequest{
	int32 id=1;
	string firstName=2;
	string lastName=3;
	string email=4;
}
message DeleteEmployeeRequest{
	int32 id=1;
}
message DeleteEmployeeResponse{
	string message=1;

}